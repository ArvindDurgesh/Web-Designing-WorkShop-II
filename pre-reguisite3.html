<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            height: 100px;
            width: 100px;
            border-radius: 5px;
            border:1px solid black;
            
        }
        button:hover{
            border:5px solid salmon;
        }
       
    </style>
</head>
<body>
    <div>
      <button style="background-color: red">red</button>
      <button style="background-color: yellow">yellow</button>
      <button style="background-color: white">white</button>
      <button style="background-color: black">black</button>
      <button style="background-color: blue">blue</button>
      <button style="background-color: pink">pink</button>
    </div>
</body>
</html>
